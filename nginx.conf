user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream definition for load balancing
    upstream extractpdf_backend {
        least_conn;  # Load balancing strategy - least connections
        server app1:8080 max_fails=2 fail_timeout=30s;
        server app2:8080 max_fails=2 fail_timeout=30s;
        server app3:8080 max_fails=2 fail_timeout=30s;
    }

    # HTTP server
    server {
        listen 80 default_server;
        server_name _;

        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://extractpdf_backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Main application
        location / {
            proxy_pass http://extractpdf_backend;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # Connection
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_redirect off;
        }

        # Static files (if any)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://extractpdf_backend;
            proxy_cache_valid 200 1d;
            expires 7d;
        }

        # Error pages
        error_page 502 503 504 /error.html;
        location = /error.html {
            default_type text/html;
            return 503 "Service temporarily unavailable. Please try again later.";
        }
    }
}

