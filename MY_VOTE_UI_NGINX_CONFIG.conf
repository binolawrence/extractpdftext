# Updated Nginx Configuration for React App + Docker Backend
# Location: /etc/nginx/sites-available/my-vote-ui
# Symlink: ln -s /etc/nginx/sites-available/my-vote-ui /etc/nginx/sites-enabled/my-vote-ui

server {
    listen 80;
    server_name mycommune.org www.mycommune.org;

    # React app static files
    root /var/www/my-vote-ui/dist;
    index index.html;

    # Main location - serves React app with SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets - optimize with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API calls - route to Docker load balancer
    location /api/ {
        # ✅ Changed from localhost:8080 to localhost:8081
        # Port 8081 is where Docker nginx load balancer is exposed
        # This load balancer distributes to 3 backend instances
        proxy_pass http://localhost:8081/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Additional headers for backend
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;

        # Connection settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts for longer requests
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Error handling
    error_page 404 /index.html;
}

