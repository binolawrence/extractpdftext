# ================================================================================
# Spring Boot Application Configuration - Test Profile
# ================================================================================
# This file is used when running tests: spring.profiles.active=test
# ================================================================================

# Test-specific paths - Use temporary directories for testing
app.pdf.docs-dir=target/test-pdfdocs
app.lucene.index-dir=target/test-lucene-index

# ====================================================================================
# Test Logging Configuration - Debug level for test debugging
# ====================================================================================
logging.level.root=WARN
logging.level.com.extract.pdf.extractpdftext=DEBUG
logging.level.com.extract.pdf.extractpdftext.controller=DEBUG
logging.level.com.extract.pdf.extractpdftext.service=DEBUG
logging.level.com.extract.pdf.extractpdftext.util=DEBUG
logging.level.com.extract.pdf.extractpdftext.config=DEBUG
logging.level.com.extract.pdf.extractpdftext.listener=DEBUG

# Test logging pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Test log file
logging.file.name=target/test-logs/application-test.log
logging.file.max-size=10MB
logging.file.max-history=5
logging.file.total-size-cap=50MB

