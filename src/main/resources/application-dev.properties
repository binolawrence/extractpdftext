# ================================================================================
# Spring Boot Application Configuration - Development Profile
# ================================================================================
# This file is used when running with: spring.profiles.active=dev
# Or: mvn clean install -Dspring.profiles.active=dev
# ================================================================================

# Override properties from application.properties only when needed for development

# Development-specific paths
app.pdf.docs-dir=C:\\Users\\bfrancis\\projects\\pdfdocs
app.lucene.index-dir=C:\\Users\\bfrancis\\projects\\lucene-index

# ====================================================================================
# Development Logging Configuration - Verbose for debugging
# ====================================================================================
logging.level.root=INFO
logging.level.com.extract.pdf.extractpdftext=DEBUG
logging.level.com.extract.pdf.extractpdftext.controller=DEBUG
logging.level.com.extract.pdf.extractpdftext.service=DEBUG
logging.level.com.extract.pdf.extractpdftext.util=DEBUG
logging.level.com.extract.pdf.extractpdftext.config=DEBUG
logging.level.com.extract.pdf.extractpdftext.configs=DEBUG
logging.level.com.extract.pdf.extractpdftext.listener=DEBUG

# Enable detailed Spring framework logging in development
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot.web=DEBUG
logging.level.org.springframework.core=DEBUG

# Development logging pattern with more details
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36}.%M(%L) - %msg%n

# Development log file
logging.file.name=logs/application-dev.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.file.total-size-cap=100MB

