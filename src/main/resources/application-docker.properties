# Spring Boot Configuration for Docker Environment

# Application
spring.application.name=extractpdftext

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Logging
logging.level.root=INFO
logging.level.com.extract.pdf=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# Actuator - Health Checks for Docker
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoints.web.base-path=/actuator

# Performance Settings
spring.threads.virtual.enabled=true

# PDF Storage (Docker mounted volume)
app.pdf.storage-path=/app/pdf-storage
app.lucene.index-path=/app/lucene-index

# CORS Configuration (if needed)
# cors.allowed-origins=*
# cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
