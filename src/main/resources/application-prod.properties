# ================================================================================
# Spring Boot Application Configuration - Production Profile
# ================================================================================
# This file is used when running with: spring.profiles.active=prod
# Or when deploying to production environment
# ================================================================================

# Production-specific paths - Change these to match your production environment
# These can be overridden by environment variables for maximum flexibility
app.pdf.docs-dir= /opt/vsearch/deployment/pdfs
app.lucene.index-dir=/opt/vsearch/deployment/lucene-index

# Production logging - Only show warnings and errors
logging.level.root=WARN
logging.level.com.extract.pdf.extractpdftext=INFO

# Disable debug features in production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

