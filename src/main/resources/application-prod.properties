# ================================================================================
# Spring Boot Application Configuration - Production Profile
# ================================================================================
# This file is used when running with: spring.profiles.active=prod
# Or when deploying to production environment
# ================================================================================

# Production-specific paths - Change these to match your production environment
# These can be overridden by environment variables for maximum flexibility
app.pdf.docs-dir= /opt/vsearch/deployment/pdfs
app.lucene.index-dir=/opt/vsearch/deployment/lucene-index

# ====================================================================================
# Production Logging Configuration - Minimal logging for performance
# ====================================================================================
logging.level.root=WARN
logging.level.com.extract.pdf.extractpdftext=INFO
logging.level.com.extract.pdf.extractpdftext.controller=INFO
logging.level.com.extract.pdf.extractpdftext.service=INFO

# Keep third-party libraries at WARN level
logging.level.org.springframework.web=WARN
logging.level.org.apache.lucene=WARN
logging.level.org.apache.pdfbox=WARN
logging.level.org.apache.tika=WARN

# Production logging pattern - More concise
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Production log file with rotation
logging.file.name=/var/log/extractpdftext/application.log
logging.file.max-size=50MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# Disable debug features in production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always