spring.application.name=extractpdftext

# Spring Boot DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2000ms
spring.devtools.restart.quiet-period=1000ms
spring.devtools.livereload.enabled=true

# DevTools Debug Logging
logging.level.org.springframework.boot.devtools=INFO

# ====================================================================================
# File Path Configuration
# ====================================================================================
# PDF Documents Directory - Path where PDF files are stored for indexing
# Can be overridden by environment variable: PDF_DOCS_DIR
# Default: C:\Users\bfrancis\projects\pdfdocs
app.pdf.docs-dir=C:\\Users\\bfrancis\\projects\\pdfdocs

# Lucene Index Directory - Path where Lucene search index is stored
# Can be overridden by environment variable: LUCENE_INDEX_DIR
# Default: C:\Users\bfrancis\projects\lucene-index
app.lucene.index-dir=C:\\Users\\bfrancis\\projects\\lucene-index

# ====================================================================================
# Configuration Priority (highest to lowest):
# 1. Environment variables (PDF_DOCS_DIR, LUCENE_INDEX_DIR)
# 2. application.properties (this file)
# 3. Hard-coded defaults in PathConfig class
# ====================================================================================

# ====================================================================================
# Logging Configuration
# ====================================================================================
# Default log level for the application
logging.level.root=INFO

# Application package logging levels
logging.level.com.extract.pdf.extractpdftext=DEBUG
logging.level.com.extract.pdf.extractpdftext.controller=DEBUG
logging.level.com.extract.pdf.extractpdftext.service=DEBUG
logging.level.com.extract.pdf.extractpdftext.util=DEBUG
logging.level.com.extract.pdf.extractpdftext.config=DEBUG
logging.level.com.extract.pdf.extractpdftext.configs=DEBUG
logging.level.com.extract.pdf.extractpdftext.listener=DEBUG
logging.level.com.extract.pdf.extractpdftext.pojo=INFO

# Spring Framework logging levels
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.web=INFO
logging.level.org.springframework.boot.actuate=INFO

# Third-party library logging levels
logging.level.org.apache.lucene=WARN
logging.level.org.apache.pdfbox=WARN
logging.level.org.apache.tika=WARN

# Logging pattern for console output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Logging pattern for file output
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Log file configuration
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.file.total-size-cap=100MB


