version: '3.8'

services:
  # Nginx reverse proxy / load balancer
  nginx:
    image: nginx:alpine
    container_name: extractpdf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - extractpdf-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Instance 1
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extractpdf-app1
    environment:
      - SPRING_APPLICATION_NAME=extractpdftext-app1
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - PDF_DOCS_DIR=/app/pdfdocs
      - LUCENE_INDEX_DIR=/app/lucene-index
      - INSTANCE_NAME=app1
    volumes:
      - ./pdfdocs:/app/pdfdocs:rw
      - ./lucene-index:/app/lucene-index:rw
      - ./logs/app1:/app/logs:rw
    networks:
      - extractpdf-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Instance 2
  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extractpdf-app2
    environment:
      - SPRING_APPLICATION_NAME=extractpdftext-app2
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - PDF_DOCS_DIR=/app/pdfdocs
      - LUCENE_INDEX_DIR=/app/lucene-index
      - INSTANCE_NAME=app2
    volumes:
      - ./pdfdocs:/app/pdfdocs:rw
      - ./lucene-index:/app/lucene-index:rw
      - ./logs/app2:/app/logs:rw
    networks:
      - extractpdf-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Instance 3
  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extractpdf-app3
    environment:
      - SPRING_APPLICATION_NAME=extractpdftext-app3
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - PDF_DOCS_DIR=/app/pdfdocs
      - LUCENE_INDEX_DIR=/app/lucene-index
      - INSTANCE_NAME=app3
    volumes:
      - ./pdfdocs:/app/pdfdocs:rw
      - ./lucene-index:/app/lucene-index:rw
      - ./logs/app3:/app/logs:rw
    networks:
      - extractpdf-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  extractpdf-network:
    driver: bridge

volumes:
  pdfdocs:
  lucene-index:

