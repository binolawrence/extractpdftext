version: '3.8'

services:
  # Nginx reverse proxy / load balancer
  nginx:
    image: nginx:alpine
    container_name: extractpdf-nginx
    ports:
      - "8081:80"  # ✅ Exposed on port 8081 for external nginx to reach
                   # External nginx at localhost:80 → API calls → localhost:8081 → Docker nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - extractpdf-network
    expose:
      - "80"  # Also exposed internally for frontend containers
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Instance 1
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extractpdf-app1
    environment:
      - SPRING_APPLICATION_NAME=extractpdftext-app1
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - PDF_DOCS_DIR=/app/pdfdocs
      - LUCENE_INDEX_DIR=/app/lucene-index
      - INSTANCE_NAME=app1
    volumes:
      - ./pdfdocs:/app/pdfdocs:ro
      - ./lucene-index:/app/lucene-index:rw
      - ./logs/app1:/app/logs:rw
    networks:
      - extractpdf-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Instance 2
  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extractpdf-app2
    environment:
      - SPRING_APPLICATION_NAME=extractpdftext-app2
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - PDF_DOCS_DIR=/app/pdfdocs
      - LUCENE_INDEX_DIR=/app/lucene-index
      - INSTANCE_NAME=app2
    volumes:
      - ./pdfdocs:/app/pdfdocs:ro
      - ./lucene-index:/app/lucene-index:ro
      - ./logs/app2:/app/logs:rw
    networks:
      - extractpdf-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Instance 3
  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extractpdf-app3
    environment:
      - SPRING_APPLICATION_NAME=extractpdftext-app3
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - PDF_DOCS_DIR=/app/pdfdocs
      - LUCENE_INDEX_DIR=/app/lucene-index
      - INSTANCE_NAME=app3
    volumes:
      - ./pdfdocs:/app/pdfdocs:ro
      - ./lucene-index:/app/lucene-index:ro
      - ./logs/app3:/app/logs:rw
    networks:
      - extractpdf-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # ============================================================================
  # FRONTEND APP - Add your frontend service here
  # ============================================================================
  # Example for React/Node.js frontend:
  #
  # frontend:
  #   build:
  #     context: ../frontend  # Path to your frontend project
  #     dockerfile: Dockerfile
  #   container_name: extractpdf-frontend
  #   ports:
  #     - "80:3000"  # Frontend accessible on port 80
  #   environment:
  #     - REACT_APP_API_URL=http://nginx  # For API calls to backend
  #     - NODE_ENV=production
  #   depends_on:
  #     - nginx  # Frontend depends on nginx (load balancer)
  #   networks:
  #     - extractpdf-network
  #   healthcheck:
  #     test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s
  #
  # To use this:
  # 1. Uncomment the section above
  # 2. Update the paths and ports as needed
  # 3. Make sure frontend can make requests to: http://nginx/
  # 4. Frontend will have load-balanced access to all 3 backend instances
  # ============================================================================

networks:
  extractpdf-network:
    driver: bridge

volumes:
  pdfdocs:
  lucene-index:



